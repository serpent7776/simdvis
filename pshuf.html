<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSHUF family — Interactive Integer Shuffle Visualisers</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --bg3: #eeede8;
    --text: #1a1a18;
    --text2: #5f5e5a;
    --text3: #888780;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --font-mono: ui-monospace, 'Cascadia Code', 'Fira Mono', monospace;
    --font-sans: system-ui, -apple-system, sans-serif;
    --radius: 8px;
    --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c;
      --bg2: #272725;
      --bg3: #2e2e2c;
      --text: #e8e6df;
      --text2: #9c9a92;
      --text3: #6e6c66;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
    }
  }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .card {
    background: var(--bg);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    width: 100%;
    max-width: 920px;
  }

  .tabs { display: flex; gap: 4px; margin-bottom: 1rem; flex-wrap: wrap; }
  .tab {
    font-size: 11px; padding: 5px 10px; border-radius: 6px;
    border: 0.5px solid var(--border); background: var(--bg2);
    color: var(--text2); cursor: pointer;
    font-family: var(--font-mono); font-weight: 500;
    transition: background .15s, border-color .15s, color .15s;
  }
  .tab:hover { background: var(--bg3); border-color: var(--border2); color: var(--text); }
  .tab.active {
    background: var(--bg); color: var(--text);
    border-color: var(--border2); font-weight: 600;
    box-shadow: inset 0 -2px 0 var(--text2);
  }

  .header { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: .25rem; }
  .title { font-size: 15px; font-weight: 500; }
  .subtitle { font-size: 12px; color: var(--text2); margin-bottom: 1rem; }

  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 500; font-family: var(--font-mono); }
  .bb { background: #B5D4F4; color: #042C53; }
  .ba { background: #FAC775; color: #412402; }
  .bg { background: #C0DD97; color: #173404; }
  .br { background: #F7C1C1; color: #501313; }
  .bp { background: #D8C9F4; color: #2A1356; }
  .bz { background: #D3D1C7; color: #2C2C2A; }

  @media (prefers-color-scheme: dark) {
    .bb { background: #0C447C; color: #B5D4F4; }
    .ba { background: #633806; color: #FAC775; }
    .bg { background: #27500A; color: #C0DD97; }
    .br { background: #791F1F; color: #F7C1C1; }
    .bp { background: #3A2070; color: #D8C9F4; }
    .bz { background: #444441; color: #D3D1C7; }
  }

  .reg-grid { display: grid; grid-template-columns: repeat(var(--cols, 4), 1fr); column-gap: 3px; row-gap: 3px; }

  .cell {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border-radius: 6px; border: 0.5px solid; font-family: var(--font-mono);
    font-size: 11px; font-weight: 500; transition: background .15s, box-shadow .15s;
    min-width: 0; position: relative; height: 46px;
  }
  .cell-idx { font-size: 9px; font-weight: 400; opacity: .55; margin-bottom: 1px; }
  .cell-val { font-size: 11px; line-height: 1; }

  .src-cell  { background: #E6F1FB; border-color: #378ADD; color: #0C447C; cursor: pointer; }
  .src-cell:hover { background: #B5D4F4; }
  .src-cell.lit { background: #FAC775; border-color: #EF9F27; color: #412402; box-shadow: 0 0 0 2px #EF9F27; }

  .mask-num  { background: #FAEEDA; border-color: #EF9F27; color: #633806; cursor: pointer; }
  .mask-num:hover { background: #FAC775; }
  .mask-hi   { background: #FCEBEB; border-color: #E24B4A; color: #501313; cursor: pointer; }
  .mask-hi:hover { background: #F7C1C1; }
  .mask-cell.active { box-shadow: 0 0 0 2.5px #EF9F27; transform: scale(1.08); z-index: 3; }

  .imm-cell { background: #FAEEDA; border-color: #EF9F27; color: #633806; cursor: pointer; }
  .imm-cell:hover { background: #FAC775; }
  .imm-cell.active { box-shadow: 0 0 0 2.5px #EF9F27; transform: scale(1.08); z-index: 3; }

  .km-cell  { background: #EEE7FA; border-color: #8367C7; color: #2A1356; cursor: pointer; height: 32px; }
  .km-cell:hover { background: #D8C9F4; }
  .km-cell.km-off { background: #F1EFE8; border-color: #888780; color: #5F5E5A; }
  .km-cell.km-off:hover { background: #E4E1D5; }
  .km-cell.active { box-shadow: 0 0 0 2.5px #8367C7; }

  .dst-val  { background: #EAF3DE; border-color: #639922; color: #27500A; cursor: default; }
  .dst-copy { background: #EAF3DE; border-color: #639922; color: #27500A; cursor: default; opacity: .72; }
  .dst-zer  { background: #F1EFE8; border-color: #888780; color: #5F5E5A; cursor: default; }
  .dst-keep { background: #F4F0FA; border-color: #8367C7; color: #2A1356; cursor: default; }

  @media (prefers-color-scheme: dark) {
    .src-cell  { background: #0C447C; border-color: #378ADD; color: #B5D4F4; }
    .src-cell:hover { background: #185FA5; }
    .src-cell.lit { background: #633806; border-color: #EF9F27; color: #FAC775; box-shadow: 0 0 0 2px #EF9F27; }
    .mask-num  { background: #633806; border-color: #EF9F27; color: #FAC775; }
    .mask-num:hover { background: #854F0B; }
    .mask-hi   { background: #791F1F; border-color: #E24B4A; color: #F7C1C1; }
    .mask-hi:hover { background: #A32D2D; }
    .imm-cell  { background: #633806; border-color: #EF9F27; color: #FAC775; }
    .imm-cell:hover { background: #854F0B; }
    .km-cell  { background: #3A2070; border-color: #8367C7; color: #D8C9F4; }
    .km-cell:hover { background: #4F2D94; }
    .km-cell.km-off { background: #2C2C2A; border-color: #5F5E5A; color: #888780; }
    .km-cell.km-off:hover { background: #3A3A38; }
    .dst-val  { background: #27500A; border-color: #639922; color: #C0DD97; }
    .dst-copy { background: #27500A; border-color: #639922; color: #C0DD97; opacity: .72; }
    .dst-zer  { background: #2C2C2A; border-color: #5F5E5A; color: #888780; }
    .dst-keep { background: #3A2070; border-color: #8367C7; color: #D8C9F4; }
  }

  .row-lbl { font-size: 11px; color: var(--text2); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  .hint { font-size: 11px; color: var(--text3); }
  .imm-lbl { font-size: 12px; color: var(--text2); font-family: var(--font-mono); margin-top: 6px; text-align: center; }

  .lane { margin-bottom: 6px; }
  .lane + .lane { padding-top: 10px; border-top: 0.5px dashed var(--border); }
  .lane-header {
    font-size: 11px; color: var(--text2); font-family: var(--font-mono);
    margin: 4px 0 6px; display: flex; align-items: center; gap: 6px;
  }
  .lane-header .lane-tag {
    font-size: 10px; padding: 1px 6px; border-radius: 3px;
    background: var(--bg2); color: var(--text2); border: 0.5px solid var(--border);
  }

  .info {
    font-size: 12px; color: var(--text2);
    background: var(--bg2); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 9px 13px; line-height: 1.6; min-height: 40px;
    margin-top: .75rem;
  }
  .info strong { color: var(--text); }
  .info code { font-family: var(--font-mono); font-size: 11px; }

  select {
    font-size: 11px; padding: 2px 5px; border-radius: 5px;
    border: 0.5px solid var(--border2);
    background: var(--bg2); color: var(--text);
  }
  .ctl { font-size: 11px; color: var(--text2); display: flex; align-items: center; gap: 5px; }
  .ctl[hidden] { display: none; }

  .popup {
    position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
    background: var(--bg); border: 0.5px solid var(--border2);
    border-radius: var(--radius); padding: 8px; z-index: 50;
    display: flex; flex-direction: column; gap: 5px; min-width: 140px;
    box-shadow: 0 4px 16px rgba(0,0,0,.12);
  }
  .popup-lbl { font-size: 10px; color: var(--text3); font-family: var(--font-mono); }
  .popup input[type=text] {
    font-family: var(--font-mono); font-size: 12px; width: 100%;
    padding: 4px 7px; border-radius: 4px; border: 0.5px solid var(--border2);
    background: var(--bg2); color: var(--text);
  }
  .popup-row { display: flex; gap: 4px; }
  .popup button {
    font-size: 11px; padding: 3px 8px; border-radius: 4px;
    border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text);
    cursor: pointer; flex: 1;
  }
  .popup button:hover { background: var(--bg3); }
  .quick-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; }
  .quick-grid button { font-size: 10px; font-family: var(--font-mono); padding: 2px 0; flex: unset; }

  footer {
    margin-top: 1.5rem; padding-top: 1rem;
    border-top: 0.5px solid var(--border);
    font-size: 11px; color: var(--text3);
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
  }
  footer a { color: var(--text3); text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
  footer a:hover { color: var(--text2); }
  .gh-icon { width: 14px; height: 14px; fill: currentColor; }
</style>
</head>
<body>
<div class="card">

  <div class="tabs" id="tabs">
    <button class="tab" data-instr="pshufb">PSHUFB</button>
    <button class="tab" data-instr="pshufw">PSHUFW</button>
    <button class="tab" data-instr="pshufd">PSHUFD</button>
    <button class="tab" data-instr="pshuflw">PSHUFLW</button>
    <button class="tab" data-instr="pshufhw">PSHUFHW</button>
  </div>

  <div class="header">
    <span class="title" id="title"></span>
    <span class="badge bb" id="isa-badge"></span>
    <span class="badge bz" id="width-badge"></span>
    <label class="ctl">
      Preset:
      <select id="preset" onchange="applyPreset(this.value)"></select>
    </label>
    <span style="flex:1"></span>
    <label class="ctl" id="width-ctl">
      Width:
      <select id="width" onchange="changeWidth(this.value)"></select>
    </label>
    <label class="ctl" id="kmode-ctl">
      Mask:
      <select id="kmode" onchange="changeKmaskMode(this.value)">
        <option value="off">none</option>
        <option value="merge">{k1} merge</option>
        <option value="zero">{k1}{z} zero</option>
      </select>
    </label>
  </div>
  <p class="subtitle" id="subtitle"></p>

  <div id="lanes"></div>

  <div id="imm-section" hidden>
    <div style="height:10px"></div>
    <div class="row-lbl">
      <span class="badge ba">imm8</span>
      <span class="hint" id="imm-hint"></span>
    </div>
    <div class="reg-grid" style="--cols:4;position:relative" id="imm-grid"></div>
    <div class="imm-lbl" id="imm-lbl"></div>
  </div>

  <div class="info" id="info">Hover over any cell to inspect the shuffle.</div>

  <footer>
    <a href="index.html">&larr; All visualisers</a>
    <a href="https://github.com/serpent7776/simdvis">
      <svg class="gh-icon" viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.64 7.64 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
      simdvis
    </a>
    <a id="isa-ref" target="_blank" rel="noopener">Intel ISA reference ↗</a>
  </footer>
</div>

<script>
// ─── Instruction configurations ─────────────────────────────────────────────
// elemBytes: bytes per element (1=byte, 2=word, 4=dword)
// lane: elements per 128-bit lane (16 bytes / 8 words / 4 dwords); for MMX (pshufw) lane=4 with 16-bit words = 64-bit register
// control: 'mask' = each output element has its own mask byte (pshufb); 'imm8' = 4×2-bit fields in imm8 share across lanes
// shufBase/nFields: imm8-mode shuffle range within a lane is [shufBase, shufBase+nFields); outside that range elements are copied unchanged
// widths: list of allowed element counts (N) for the width selector
// kmask: true if AVX-512 {k1} masking is supported
const CONFIGS = {
  pshufb: {
    title: 'PSHUFB / VPSHUFB',
    pageTitle: 'PSHUFB / VPSHUFB — Interactive Byte Shuffle Visualiser',
    isaRef: 'https://www.felixcloutier.com/x86/pshufb',
    subtitle: 'Packed byte shuffle — per 128-bit lane: <code>dst[i] = src[(mask[i] &amp; 0x0F) + 16·lane]</code>, or <code>0x00</code> if mask[i] bit 7 is set.',
    elemBytes: 1, lane: 16,
    control: 'mask',
    widths: [16, 32, 64], kmask: true,
    isaForWidth: (N, km) => (N === 16 ? (km==='off'?'SSSE3':'AVX-512BW+VL')
                          : N === 32 ? (km==='off'?'AVX2' :'AVX-512BW+VL')
                                     : 'AVX-512BW'),
    presetOptions: [
      ['identity',  'Identity'],
      ['reverse',   'Reverse (per lane)'],
      ['broadcast', 'Broadcast [0]'],
      ['rotate4',   'Rotate +4'],
      ['zeroall',   'Zero all'],
      ['evens',     'Pack evens'],
    ],
    presets: {
      identity:  i => i % 16,
      reverse:   i => 15 - (i % 16),
      broadcast: () => 0,
      rotate4:   i => ((i % 16) + 4) % 16,
      zeroall:   () => 0x80,
      evens:     i => { const li = i % 16; return li < 8 ? li*2 : 0x80; },
    },
    srcInit: i => i & 0xFF,
    elemName: 'byte', elemNameP: 'bytes',
  },
  pshufw: {
    title: 'PSHUFW',
    pageTitle: 'PSHUFW — Interactive Word Shuffle Visualiser',
    isaRef: 'https://www.felixcloutier.com/x86/pshufw',
    subtitle: 'Packed word shuffle (MMX) — <code>dst[i] = src[imm8_field(i)]</code>, four 2-bit fields.',
    elemBytes: 2, lane: 4,
    control: 'imm8', shufBase: 0, nFields: 4,
    widths: [4], kmask: false,
    isaForWidth: () => 'SSE',
    widthLabel: () => '64-bit MMX',
    presetOptions: [
      ['identity',   'Identity (0xE4)'],
      ['reverse',    'Reverse (0x1B)'],
      ['broadcast0', 'Broadcast [0] (0x00)'],
      ['broadcast3', 'Broadcast [3] (0xFF)'],
      ['swaphalves', 'Swap halves (0x4E)'],
    ],
    presets: { identity:0xE4, reverse:0x1B, broadcast0:0x00, broadcast3:0xFF, swaphalves:0x4E },
    defaultImm: 0xE4,
    immHint: 'left-click: cycle 0–3 · right-click: edit full imm8',
    srcInit: i => 0x1111 * (i & 0xF),
    elemName: 'word', elemNameP: 'words',
  },
  pshufd: {
    title: 'PSHUFD / VPSHUFD',
    pageTitle: 'PSHUFD / VPSHUFD — Interactive Dword Shuffle Visualiser',
    isaRef: 'https://www.felixcloutier.com/x86/pshufd',
    subtitle: 'Packed dword shuffle — per 128-bit lane: <code>dst[i] = src[(imm8 &gt;&gt; (i·2)) &amp; 3]</code>. The same imm8 controls every lane.',
    elemBytes: 4, lane: 4,
    control: 'imm8', shufBase: 0, nFields: 4,
    widths: [4, 8, 16], kmask: true,
    isaForWidth: (N, km) => (N === 4 ? (km==='off'?'SSE2':'AVX-512F+VL')
                           : N === 8 ? (km==='off'?'AVX2':'AVX-512F+VL')
                                     : 'AVX-512F'),
    presetOptions: [
      ['identity',   'Identity (0xE4)'],
      ['reverse',    'Reverse (0x1B)'],
      ['broadcast0', 'Broadcast [0] (0x00)'],
      ['broadcast3', 'Broadcast [3] (0xFF)'],
      ['swaphalves', 'Swap halves (0x4E)'],
    ],
    presets: { identity:0xE4, reverse:0x1B, broadcast0:0x00, broadcast3:0xFF, swaphalves:0x4E },
    defaultImm: 0xE4,
    immHint: 'left-click: cycle 0–3 · right-click: edit full imm8 · shared across lanes',
    srcInit: i => (0x11111111 * (i & 0xF)) >>> 0,
    elemName: 'dword', elemNameP: 'dwords',
  },
  pshuflw: {
    title: 'PSHUFLW / VPSHUFLW',
    pageTitle: 'PSHUFLW / VPSHUFLW — Interactive Low-Word Shuffle Visualiser',
    isaRef: 'https://www.felixcloutier.com/x86/pshuflw',
    subtitle: 'Packed low-word shuffle — per 128-bit lane: low 4 words shuffled by imm8, high 4 words copied unchanged. <code>imm8</code> is shared across lanes.',
    elemBytes: 2, lane: 8,
    control: 'imm8', shufBase: 0, nFields: 4,
    widths: [8, 16, 32], kmask: true,
    isaForWidth: (N, km) => (N === 8  ? (km==='off'?'SSE2':'AVX-512BW+VL')
                           : N === 16 ? (km==='off'?'AVX2':'AVX-512BW+VL')
                                      : 'AVX-512BW'),
    presetOptions: [
      ['identity',   'Identity (0xE4)'],
      ['reverselow', 'Reverse low (0x1B)'],
      ['broadcast0', 'Broadcast [0] (0x00)'],
    ],
    presets: { identity:0xE4, reverselow:0x1B, broadcast0:0x00 },
    defaultImm: 0xE4,
    immHint: 'controls the lower 4 words of every lane · left-click: cycle 0–3 · right-click: edit imm8',
    srcInit: i => 0x1111 * (i & 0xF),
    elemName: 'word', elemNameP: 'words',
  },
  pshufhw: {
    title: 'PSHUFHW / VPSHUFHW',
    pageTitle: 'PSHUFHW / VPSHUFHW — Interactive High-Word Shuffle Visualiser',
    isaRef: 'https://www.felixcloutier.com/x86/pshufhw',
    subtitle: 'Packed high-word shuffle — per 128-bit lane: high 4 words shuffled by imm8, low 4 words copied unchanged. <code>imm8</code> is shared across lanes.',
    elemBytes: 2, lane: 8,
    control: 'imm8', shufBase: 4, nFields: 4,
    widths: [8, 16, 32], kmask: true,
    isaForWidth: (N, km) => (N === 8  ? (km==='off'?'SSE2':'AVX-512BW+VL')
                           : N === 16 ? (km==='off'?'AVX2':'AVX-512BW+VL')
                                      : 'AVX-512BW'),
    presetOptions: [
      ['identity',    'Identity (0xE4)'],
      ['reversehigh', 'Reverse high (0x1B)'],
      ['broadcast4',  'Broadcast [4] (0x00)'],
    ],
    presets: { identity:0xE4, reversehigh:0x1B, broadcast4:0x00 },
    defaultImm: 0xE4,
    immHint: 'controls the upper 4 words of every lane · left-click: cycle 0–3 · right-click: edit imm8',
    srcInit: i => 0x1111 * (i & 0xF),
    elemName: 'word', elemNameP: 'words',
  },
};

// ─── State ──────────────────────────────────────────────────────────────────
let CFG;
let N, LANE, LANES;
let imm8 = 0xE4;
let kmode = 'off';
let src, mask, kmask, dstPrev;
let hovLane = -1, hovSrc = -1, hovK = -1, hovImm = -1;

// ─── Helpers ────────────────────────────────────────────────────────────────
function hexN(v, bytes){ return (v >>> 0).toString(16).toUpperCase().padStart(bytes*2, '0'); }
function hexVal(v){ return hexN(v, CFG.elemBytes); }
function zeroStr(){ return '0x' + '0'.repeat(CFG.elemBytes*2); }
function hex2(v){ return v.toString(16).toUpperCase().padStart(2, '0'); }
function laneOf(i){ return (i / LANE) | 0; }
function getField(k){ return (imm8 >> (k*2)) & 3; }
function setField(k, v){ imm8 = (imm8 & ~(3 << (k*2))) | ((v & 3) << (k*2)); }
function isShuffled(k){ return CFG.control === 'imm8' && k >= CFG.shufBase && k < CFG.shufBase + CFG.nFields; }

function prevFill(){
  return CFG.elemBytes === 1 ? 0xEE : CFG.elemBytes === 2 ? 0xCCCC : 0xCCCCCCCC;
}
function maxVal(){
  return CFG.elemBytes === 4 ? 0xFFFFFFFF : (1 << (CFG.elemBytes * 8)) - 1;
}
function quickFill(b){
  if(CFG.elemBytes === 1) return b;
  if(CFG.elemBytes === 2) return (b << 8) | b;
  return ((b<<24) | (b<<16) | (b<<8) | b) >>> 0;
}

// Returns where dst[i] sources from in src.
//   { kind:'val',  srcIdx }   — shuffled value
//   { kind:'zero' }           — pshufb with hi-bit set
//   { kind:'copy', srcIdx:i } — element outside the imm8 shuffle range
function srcRouteFor(i){
  if(CFG.control === 'mask'){
    const m = mask[i];
    if(m & 0x80) return { kind:'zero' };
    return { kind:'val', srcIdx: laneOf(i) * LANE + (m & 0x0F) };
  }
  const l = laneOf(i), k = i - l*LANE;
  if(isShuffled(k)){
    const fi = k - CFG.shufBase;
    return { kind:'val', srcIdx: l*LANE + CFG.shufBase + getField(fi) };
  }
  return { kind:'copy', srcIdx: i };
}

function dstStatus(i){
  if(CFG.kmask && kmode !== 'off' && !kmask[i]){
    return kmode === 'zero' ? { kind:'zero' } : { kind:'keep', val: dstPrev[i] };
  }
  const r = srcRouteFor(i);
  if(r.kind === 'zero') return { kind:'zero' };
  return { kind: r.kind === 'copy' ? 'copy' : 'val', val: src[r.srcIdx] };
}

function isaLabel(){ return CFG.isaForWidth(N, kmode); }
function regNameForBits(bits){ return bits === 128 ? 'XMM' : bits === 256 ? 'YMM' : 'ZMM'; }
function widthLabel(){
  if(CFG.widthLabel) return CFG.widthLabel();
  const bits = N * CFG.elemBytes * 8;
  return `${bits}-bit ${regNameForBits(bits)}`;
}

// ─── Init / instruction switching ───────────────────────────────────────────
function initData(n){
  N = n; LANES = N / LANE;
  src     = Array.from({length:N}, (_,i) => CFG.srcInit(i));
  mask    = Array.from({length:N}, (_,i) => i % LANE);
  kmask   = Array.from({length:N}, () => 1);
  dstPrev = Array.from({length:N}, () => prevFill());
}

function selectInstruction(name){
  if(!CONFIGS[name]) name = 'pshufb';
  CFG = CONFIGS[name];
  N = CFG.widths[0]; LANE = CFG.lane; LANES = N / LANE;
  if(CFG.control === 'imm8') imm8 = CFG.defaultImm;
  kmode = 'off';
  hovLane = -1; hovSrc = -1; hovK = -1; hovImm = -1;
  closePopup();
  initData(N);

  document.title = CFG.pageTitle;
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.instr === name));
  document.getElementById('title').textContent = CFG.title;
  document.getElementById('subtitle').innerHTML = CFG.subtitle;
  document.getElementById('isa-ref').href = CFG.isaRef;

  rebuildPresetOptions();
  rebuildWidthOptions();
  document.getElementById('kmode-ctl').hidden = !CFG.kmask;
  document.getElementById('kmode').value = 'off';
  const immSection = document.getElementById('imm-section');
  immSection.hidden = CFG.control !== 'imm8';
  if(CFG.control === 'imm8') document.getElementById('imm-hint').textContent = CFG.immHint;

  rebuildLanes();
  syncBadges();

  const def = CFG.presetOptions[0][0];
  document.getElementById('preset').value = def;
  applyPreset(def);

  if(location.hash !== '#' + name) history.replaceState(null, '', '#' + name);
}

function rebuildPresetOptions(){
  const sel = document.getElementById('preset');
  sel.innerHTML = '';
  for(const [val, label] of CFG.presetOptions){
    const opt = document.createElement('option');
    opt.value = val; opt.textContent = label;
    sel.appendChild(opt);
  }
}

function rebuildWidthOptions(){
  const sel = document.getElementById('width');
  sel.innerHTML = '';
  for(const w of CFG.widths){
    const opt = document.createElement('option');
    opt.value = w;
    if(CFG.widthLabel){
      opt.textContent = CFG.widthLabel();
    } else {
      const bits = w * CFG.elemBytes * 8;
      opt.textContent = `${regNameForBits(bits)} (${bits})`;
    }
    sel.appendChild(opt);
  }
  sel.value = N;
  document.getElementById('width-ctl').hidden = CFG.widths.length < 2;
}

function applyPreset(k){
  if(CFG.control === 'imm8'){
    if(CFG.presets[k] === undefined) return;
    imm8 = CFG.presets[k];
  } else {
    const fn = CFG.presets[k];
    if(!fn) return;
    for(let i=0; i<N; i++) mask[i] = fn(i);
  }
  closePopup();
  hovLane = -1; hovSrc = -1; hovK = -1; hovImm = -1;
  render(); drawAllArrows();
}

function changeWidth(w){
  const newN = parseInt(w);
  if(newN === N) return;
  if(CFG.control === 'mask'){
    // Preserve mask pattern from lane 0, replicate across all lanes.
    const oldLane0 = mask.slice(0, LANE);
    initData(newN);
    for(let i=0; i<N; i++) mask[i] = oldLane0[i % LANE];
  } else {
    initData(newN);
  }
  rebuildLanes();
  syncBadges();
  render(); drawAllArrows();
}

function changeKmaskMode(m){
  if(m === kmode) return;
  kmode = m;
  for(let l=0; l<LANES; l++){
    document.getElementById('kmask-row-'+l).hidden = (kmode === 'off');
  }
  updateKmaskHints();
  syncBadges();
  render(); drawAllArrows();
}

function updateKmaskHints(){
  if(!CFG.kmask) return;
  const txt = kmode === 'zero'  ? `click to toggle 0/1 — 0 zeroes the output ${CFG.elemName}`
            : kmode === 'merge' ? `click to toggle 0/1 — 0 keeps the prior dst ${CFG.elemName}`
                                : "click to toggle 0/1 — 1 = element active";
  document.querySelectorAll('.kmask-hint').forEach(el => el.textContent = txt);
}

function syncBadges(){
  document.getElementById('isa-badge').textContent = isaLabel();
  document.getElementById('width-badge').textContent = widthLabel();
}

// ─── Lane / row construction ────────────────────────────────────────────────
function rebuildLanes(){
  const root = document.getElementById('lanes');
  root.innerHTML = '';
  for(let l=0; l<LANES; l++){
    const wrap = document.createElement('div');
    wrap.className = 'lane';
    const laneHeader = LANES > 1
      ? `<div class="lane-header"><span class="lane-tag">Lane ${l}</span><span class="hint">${CFG.elemNameP} [${l*LANE}..${l*LANE+LANE-1}]</span></div>`
      : '';
    const kmaskBlock = CFG.kmask ? `
        <div class="kmask-row" id="kmask-row-${l}" ${kmode==='off'?'hidden':''}>
          <div style="height:8px"></div>
          <div class="row-lbl"><span class="badge bp">k1</span><span class="hint kmask-hint">click to toggle 0/1</span></div>
          <div class="reg-grid" style="--cols:${LANE}" id="kmask-grid-${l}"></div>
        </div>` : '';

    if(CFG.control === 'mask'){
      wrap.innerHTML = laneHeader + `
        <div class="row-lbl"><span class="badge bb">src</span><span class="hint">click a ${CFG.elemName} to edit</span></div>
        <div class="reg-grid" style="--cols:${LANE};position:relative" id="src-grid-${l}"></div>
        <div style="position:relative;height:52px;margin:2px 0">
          <canvas id="arrows-${l}" style="width:100%;display:block" height="52"></canvas>
        </div>
        <div class="row-lbl">
          <span class="badge ba">mask</span>
          <span class="hint">left-click: cycle 0–${LANE-1} &nbsp;·&nbsp; right-click: toggle 0x80</span>
        </div>
        <div class="reg-grid" style="--cols:${LANE}" id="mask-grid-${l}"></div>
        ${kmaskBlock}
        <div style="height:8px"></div>
        <div class="row-lbl"><span class="badge bg">dst</span></div>
        <div class="reg-grid" style="--cols:${LANE}" id="dst-grid-${l}"></div>
      `;
    } else {
      let dstHint = '';
      if(CFG.shufBase > 0){
        dstHint = `<span class="hint">${CFG.elemNameP} [0..${CFG.shufBase-1}] copied unchanged</span>`;
      } else if(CFG.shufBase + CFG.nFields < LANE){
        dstHint = `<span class="hint">${CFG.elemNameP} [${CFG.shufBase + CFG.nFields}..${LANE-1}] copied unchanged</span>`;
      }
      wrap.innerHTML = laneHeader + `
        <div class="row-lbl"><span class="badge bb">src</span><span class="hint">click a ${CFG.elemName} to edit</span></div>
        <div class="reg-grid" style="--cols:${LANE};position:relative" id="src-grid-${l}"></div>
        <div style="position:relative;height:52px;margin:2px 0">
          <canvas id="arrows-${l}" style="width:100%;display:block" height="52"></canvas>
        </div>
        <div class="row-lbl"><span class="badge bg">dst</span>${dstHint}</div>
        <div class="reg-grid" style="--cols:${LANE}" id="dst-grid-${l}"></div>
        ${kmaskBlock}
      `;
    }
    root.appendChild(wrap);
  }
  updateKmaskHints();
}

// ─── Rendering ──────────────────────────────────────────────────────────────
function render(){
  for(let l=0; l<LANES; l++){
    renderSrcLane(l);
    if(CFG.control === 'mask') renderMaskLane(l);
    renderDstLane(l);
    if(CFG.kmask) renderKmaskLane(l);
  }
  if(CFG.control === 'imm8') renderImm();
}

function srcLitFor(i, l){
  if(hovSrc === i) return true;
  const base = l * LANE;
  const refs = [];
  if(hovLane >= 0) refs.push(hovLane);
  if(hovK    >= 0) refs.push(hovK);
  for(const r of refs){
    if(laneOf(r) !== l) continue;
    const rt = srcRouteFor(r);
    if(rt.kind !== 'zero' && rt.srcIdx === i) return true;
  }
  // hovered imm field — same field affects every lane (imm8-mode only).
  if(CFG.control === 'imm8' && hovImm >= 0){
    if(i === base + CFG.shufBase + getField(hovImm)) return true;
  }
  return false;
}

function renderSrcLane(l){
  const g = document.getElementById('src-grid-'+l);
  const old = document.getElementById('active-popup');
  g.innerHTML = '';
  if(old && old._popTarget === 'src' && +old.dataset.lane === l) g.appendChild(old);
  const base = l * LANE;
  for(let k=0; k<LANE; k++){
    const i = base + k;
    const lit = srcLitFor(i, l);
    const el = document.createElement('div');
    el.className = 'cell src-cell' + (lit ? ' lit' : '');
    el.innerHTML = `<span class="cell-idx">[${i}]</span><span class="cell-val">0x${hexVal(src[i])}</span>`;
    el.title = `src[${i}] = 0x${hexVal(src[i])} — click to edit`;
    el.onclick = () => openSrcPopup(i, el, l);
    el.addEventListener('mouseenter', () => { hovSrc=i; hovLane=-1; hovK=-1; hovImm=-1; render(); drawAllArrows(); updateInfo(); });
    el.addEventListener('mouseleave', () => { hovSrc=-1; render(); drawAllArrows(); resetInfo(); });
    g.appendChild(el);
  }
}

function renderMaskLane(l){
  const g = document.getElementById('mask-grid-'+l);
  g.innerHTML = '';
  const base = l * LANE;
  for(let k=0; k<LANE; k++){
    const i = base + k;
    const m = mask[i];
    const isHi = !!(m & 0x80);
    const active = hovLane === i
                || hovK === i
                || (hovSrc >= 0 && laneOf(hovSrc) === l && !isHi && (m & 0x0F) === (hovSrc - base));
    const el = document.createElement('div');
    el.className = 'cell mask-cell ' + (isHi ? 'mask-hi' : 'mask-num') + (active ? ' active' : '');
    el.innerHTML = `<span class="cell-idx">[${i}]</span><span class="cell-val">${isHi ? '0x'+hex2(m) : m}</span>`;
    el.title = isHi
      ? `mask[${i}] = 0x${hex2(m)} → zero`
      : `mask[${i}] = ${m} → src[${base + (m & 0x0F)}]`;
    el.onclick       = e => { e.preventDefault(); cycleMask(i); };
    el.oncontextmenu = e => { e.preventDefault(); toggleHiBit(i); };
    el.addEventListener('mouseenter', () => { hovLane=i; hovSrc=-1; hovK=-1; render(); drawAllArrows(); updateInfo(); });
    el.addEventListener('mouseleave', () => { hovLane=-1; render(); drawAllArrows(); resetInfo(); });
    g.appendChild(el);
  }
}

function renderDstLane(l){
  const g = document.getElementById('dst-grid-'+l);
  g.innerHTML = '';
  const base = l * LANE;
  for(let k=0; k<LANE; k++){
    const i = base + k;
    const s = dstStatus(i);
    const el = document.createElement('div');
    let txt, cls;
    if(s.kind === 'val')       { txt = '0x'+hexVal(s.val); cls = 'dst-val'; }
    else if(s.kind === 'copy') { txt = '0x'+hexVal(s.val); cls = 'dst-copy'; }
    else if(s.kind === 'zero') { txt = zeroStr();          cls = 'dst-zer'; }
    else                       { txt = '0x'+hexVal(s.val); cls = 'dst-keep'; }
    el.className = 'cell ' + cls;
    let lit = hovLane === i || hovK === i;
    if(CFG.control === 'imm8' && hovImm >= 0 && k === CFG.shufBase + hovImm) lit = true;
    if(hovSrc >= 0){
      const rt = srcRouteFor(i);
      if(rt.kind !== 'zero' && rt.srcIdx === hovSrc) lit = true;
    }
    if(lit) el.style.boxShadow = '0 0 0 2.5px #639922';
    el.innerHTML = `<span class="cell-idx">[${i}]</span><span class="cell-val">${txt}</span>`;
    el.title = s.kind === 'val'  ? `dst[${i}] = 0x${hexVal(s.val)}`
            :  s.kind === 'copy' ? `dst[${i}] = src[${i}] = 0x${hexVal(s.val)} (copied unchanged)`
            :  s.kind === 'zero' ? `dst[${i}] = ${zeroStr()} (zeroed)`
            :                      `dst[${i}] = 0x${hexVal(s.val)} (kept — k1 mask off)`;
    el.addEventListener('mouseenter', () => { hovLane=i; hovSrc=-1; hovK=-1; hovImm=-1; render(); drawAllArrows(); updateInfo(); });
    el.addEventListener('mouseleave', () => { hovLane=-1; render(); drawAllArrows(); resetInfo(); });
    g.appendChild(el);
  }
}

function renderKmaskLane(l){
  if(kmode === 'off') return;
  const g = document.getElementById('kmask-grid-'+l);
  g.innerHTML = '';
  const base = l * LANE;
  for(let k=0; k<LANE; k++){
    const i = base + k;
    const on = !!kmask[i];
    const active = hovK === i || hovLane === i || hovSrc === i;
    const el = document.createElement('div');
    el.className = 'cell km-cell ' + (on ? '' : 'km-off') + (active ? ' active' : '');
    el.innerHTML = `<span class="cell-idx">[${i}]</span><span class="cell-val">${on ? 1 : 0}</span>`;
    el.title = `k1[${i}] = ${on?1:0} → ${on ? 'pass-through' : (kmode==='zero' ? 'zero' : 'keep prior dst')}`;
    el.onclick = () => { kmask[i] = on ? 0 : 1; hovK = i; render(); updateInfo(); };
    el.addEventListener('mouseenter', () => { hovK=i; hovLane=-1; hovSrc=-1; hovImm=-1; render(); drawAllArrows(); updateInfo(); });
    el.addEventListener('mouseleave', () => { hovK=-1; render(); drawAllArrows(); resetInfo(); });
    g.appendChild(el);
  }
}

function renderImm(){
  const g = document.getElementById('imm-grid');
  g.innerHTML = '';
  for(let k=0; k<CFG.nFields; k++){
    const f = getField(k);
    const dstWithin = CFG.shufBase + k;
    const active = hovImm === k
                || (hovLane >= 0 && (hovLane % LANE) === dstWithin)
                || (hovK    >= 0 && (hovK    % LANE) === dstWithin);
    const el = document.createElement('div');
    el.className = 'cell imm-cell' + (active ? ' active' : '');
    el.innerHTML = `<span class="cell-idx">bits [${k*2+1}:${k*2}]</span><span class="cell-val">${f}</span>`;
    el.title = `imm8 field ${k} = ${f} → dst[lane·${LANE}+${dstWithin}] ← src[lane·${LANE}+${CFG.shufBase + f}]`;
    el.onclick = e => {
      e.preventDefault();
      setField(k, (getField(k)+1) % 4);
      document.getElementById('preset').value = '';
      hovImm = k; hovLane = -1; hovSrc = -1; hovK = -1;
      render(); drawAllArrows(); updateInfo();
    };
    el.oncontextmenu = e => { e.preventDefault(); openImmPopup(el); };
    el.addEventListener('mouseenter', () => { hovImm=k; hovLane=-1; hovSrc=-1; hovK=-1; render(); drawAllArrows(); updateInfo(); });
    el.addEventListener('mouseleave', () => { hovImm=-1; render(); drawAllArrows(); resetInfo(); });
    g.appendChild(el);
  }
  document.getElementById('imm-lbl').textContent = 'imm8 = 0x' + hex2(imm8);
}

// ─── Mask cell mutation (pshufb) ────────────────────────────────────────────
function cycleMask(i){
  mask[i] = mask[i] === 0x80 ? 0 : (mask[i] + 1) % LANE;
  document.getElementById('preset').value = '';
  hovLane = i; render(); drawAllArrows(); updateInfo();
}
function toggleHiBit(i){
  mask[i] = mask[i] === 0x80 ? 0 : 0x80;
  document.getElementById('preset').value = '';
  hovLane = i; render(); drawAllArrows(); updateInfo();
}

// ─── Info box ───────────────────────────────────────────────────────────────
function resetInfo(){ document.getElementById('info').textContent = 'Hover over any cell to inspect the shuffle.'; }

function updateInfo(){
  const box = document.getElementById('info');

  if(hovK >= 0){
    const on = !!kmask[hovK];
    const l = laneOf(hovK), k = hovK % LANE, base = l*LANE;
    let path;
    if(CFG.control === 'mask'){
      const m = mask[hovK];
      path = (m & 0x80)
        ? `<strong>mask[${hovK}] = 0x${hex2(m)}</strong> → would zero`
        : `<strong>mask[${hovK}] = ${m}</strong> → <strong>src[${base + (m & 0x0F)}] = 0x${hexVal(src[base + (m & 0x0F)])}</strong>`;
    } else if(isShuffled(k)){
      const fi = k - CFG.shufBase, f = getField(fi), si = base + CFG.shufBase + f;
      path = `<strong>imm8 field ${fi} = ${f}</strong> → <strong>src[${si}] = 0x${hexVal(src[si])}</strong>`;
    } else {
      path = `<strong>copy</strong> from <strong>src[${hovK}] = 0x${hexVal(src[hovK])}</strong>`;
    }
    if(on){
      const r = srcRouteFor(hovK);
      const tail = r.kind === 'zero'
        ? `<strong>dst[${hovK}] = ${zeroStr()}</strong>`
        : `<strong>dst[${hovK}] = 0x${hexVal(src[r.srcIdx])}</strong>`;
      box.innerHTML = `<strong>k1[${hovK}] = 1</strong> — pass-through · ${path} → ${tail}`;
    } else {
      const tail = kmode === 'zero'
        ? `<strong>dst[${hovK}] = ${zeroStr()}</strong> (zeroed by {z})`
        : `<strong>dst[${hovK}] = 0x${hexVal(dstPrev[hovK])}</strong> (kept — prior value)`;
      box.innerHTML = `<strong>k1[${hovK}] = 0</strong> — shuffle suppressed · ${path} → ${tail}`;
    }
    return;
  }

  if(CFG.control === 'imm8' && hovImm >= 0){
    const f = getField(hovImm);
    const dstWithin = CFG.shufBase + hovImm;
    const srcWithin = CFG.shufBase + f;
    box.innerHTML = `<strong>imm8 field ${hovImm} = ${f}</strong> — in each lane: <strong>dst[lane·${LANE}+${dstWithin}] ← src[lane·${LANE}+${srcWithin}]</strong>`;
    return;
  }

  if(hovSrc >= 0){
    const l = laneOf(hovSrc);
    const refs = [];
    for(let i=0; i<N; i++){
      if(CFG.kmask && kmode !== 'off' && !kmask[i]) continue;
      const r = srcRouteFor(i);
      if(r.kind !== 'zero' && r.srcIdx === hovSrc) refs.push(i);
    }
    const laneNote = LANES > 1 ? ` <span class="hint">(lane ${l})</span>` : '';
    const verb = CFG.control === 'mask' ? 'read by' : 'flows to';
    if(refs.length === 0){
      box.innerHTML = `<strong>src[${hovSrc}] = 0x${hexVal(src[hovSrc])}</strong>${laneNote} — not referenced by any dst ${CFG.elemName}`;
    } else {
      box.innerHTML = `<strong>src[${hovSrc}] = 0x${hexVal(src[hovSrc])}</strong>${laneNote} → ${verb} dst ${CFG.elemName}${refs.length>1?'s':''} <strong>${refs.join(', ')}</strong>`;
    }
    return;
  }

  if(hovLane < 0){ resetInfo(); return; }

  const i = hovLane, l = laneOf(i), k = i - l*LANE, base = l*LANE;
  if(CFG.kmask && kmode !== 'off' && !kmask[i]){
    const tail = kmode === 'zero'
      ? `<strong>dst[${i}] = ${zeroStr()}</strong> (zeroed by {z})`
      : `<strong>dst[${i}] = 0x${hexVal(dstPrev[i])}</strong> (kept)`;
    box.innerHTML = `<strong>k1[${i}] = 0</strong> — shuffle suppressed → ${tail}`;
    return;
  }

  if(CFG.control === 'mask'){
    const m = mask[i];
    if(m & 0x80){
      box.innerHTML = `<strong>mask[${i}] = 0x${hex2(m)}</strong> — high bit set → <strong>dst[${i}] = ${zeroStr()}</strong>`;
    } else {
      const idx = base + (m & 0x0F);
      const laneNote = LANES > 1 ? ` <span class="hint">(lane ${l})</span>` : '';
      box.innerHTML = `<strong>mask[${i}] = ${m}</strong>${laneNote} → reads <strong>src[${idx}] = 0x${hexVal(src[idx])}</strong> → <strong>dst[${i}] = 0x${hexVal(src[idx])}</strong>`;
    }
    return;
  }

  // imm8 control
  const laneNote = LANES > 1 ? ` <span class="hint">(lane ${l})</span>` : '';
  if(isShuffled(k)){
    const fi = k - CFG.shufBase, f = getField(fi), si = base + CFG.shufBase + f;
    box.innerHTML = `<strong>imm8 field ${fi} = ${f}</strong>${laneNote} → reads <strong>src[${si}] = 0x${hexVal(src[si])}</strong> → <strong>dst[${i}] = 0x${hexVal(src[si])}</strong>`;
  } else {
    const half = CFG.shufBase === 0 ? 'high' : 'low';
    box.innerHTML = `<strong>dst[${i}] = src[${i}] = 0x${hexVal(src[i])}</strong> — ${half} half copied unchanged`;
  }
}

// ─── Popups ─────────────────────────────────────────────────────────────────
function openSrcPopup(i, el, l){
  closePopup();
  const g = document.getElementById('src-grid-'+l);
  const gRect = g.getBoundingClientRect();
  const eRect = el.getBoundingClientRect();
  const leftPx = eRect.left + eRect.width/2 - gRect.left;

  const pop = document.createElement('div');
  pop.className = 'popup'; pop.id = 'active-popup'; pop._popTarget = 'src';
  pop.dataset.lane = l;
  pop.style.left = leftPx + 'px';

  const lbl = document.createElement('div');
  lbl.className = 'popup-lbl'; lbl.textContent = `src[${i}]`;

  const inp = document.createElement('input');
  inp.type = 'text'; inp.value = '0x' + hexVal(src[i]); inp.placeholder = '0x' + '0'.repeat(CFG.elemBytes*2);
  inp.onkeydown = e => {
    if(e.key === 'Enter'){ commitSrc(i, inp.value); closePopup(); }
    if(e.key === 'Escape') closePopup();
  };

  const row = document.createElement('div'); row.className = 'popup-row';
  const btnOk = document.createElement('button');
  btnOk.textContent = 'Set';
  btnOk.onclick = () => { commitSrc(i, inp.value); closePopup(); };
  const btnX = document.createElement('button');
  btnX.textContent = 'Cancel'; btnX.style.color = 'var(--text3)';
  btnX.onclick = closePopup;
  row.appendChild(btnOk); row.appendChild(btnX);

  const qg = document.createElement('div'); qg.className = 'quick-grid';
  for(const b of [0x00, 0xFF, 0xAA, 0x55]){
    const v = quickFill(b);
    const btn = document.createElement('button');
    btn.textContent = '0x' + hexVal(v);
    btn.onclick = () => { src[i] = v; closePopup(); render(); drawAllArrows(); };
    qg.appendChild(btn);
  }

  pop.appendChild(lbl); pop.appendChild(inp); pop.appendChild(row); pop.appendChild(qg);
  g.appendChild(pop);
  setTimeout(() => inp.select(), 0);

  function outside(e){ if(!pop.contains(e.target) && e.target !== el){ closePopup(); } }
  pop._out = outside;
  document.addEventListener('mousedown', outside);
}

function openImmPopup(el){
  closePopup();
  const eRect = el.getBoundingClientRect();
  const pop = document.createElement('div');
  pop.className = 'popup'; pop.id = 'active-popup'; pop._popTarget = 'imm';
  pop.style.position = 'fixed';
  pop.style.left = (eRect.left + eRect.width/2) + 'px';
  pop.style.bottom = (window.innerHeight - eRect.top + 6) + 'px';
  pop.style.transform = 'translateX(-50%)';

  const lbl = document.createElement('div');
  lbl.className = 'popup-lbl'; lbl.textContent = 'imm8';

  const inp = document.createElement('input');
  inp.type = 'text'; inp.value = '0x' + hex2(imm8); inp.placeholder = '0x00–0xFF';
  inp.onkeydown = e => {
    if(e.key === 'Enter'){ commitImm(inp.value); closePopup(); }
    if(e.key === 'Escape') closePopup();
  };

  const row = document.createElement('div'); row.className = 'popup-row';
  const btnOk = document.createElement('button');
  btnOk.textContent = 'Set';
  btnOk.onclick = () => { commitImm(inp.value); closePopup(); };
  const btnX = document.createElement('button');
  btnX.textContent = 'Cancel'; btnX.style.color = 'var(--text3)';
  btnX.onclick = closePopup;
  row.appendChild(btnOk); row.appendChild(btnX);

  pop.appendChild(lbl); pop.appendChild(inp); pop.appendChild(row);
  document.body.appendChild(pop);
  setTimeout(() => inp.select(), 0);

  function outside(e){ if(!pop.contains(e.target) && e.target !== el){ closePopup(); } }
  pop._out = outside;
  document.addEventListener('mousedown', outside);
}

function commitSrc(i, raw){
  const v = parseInt(raw.trim().replace(/^0x/i, ''), 16);
  if(!isNaN(v) && v >= 0 && v <= maxVal()){ src[i] = v; render(); drawAllArrows(); }
}
function commitImm(raw){
  const v = parseInt(raw.trim().replace(/^0x/i, ''), 16);
  if(!isNaN(v) && v >= 0 && v <= 0xFF){
    imm8 = v;
    document.getElementById('preset').value = '';
    render(); drawAllArrows();
  }
}
function closePopup(){
  const p = document.getElementById('active-popup');
  if(p){ document.removeEventListener('mousedown', p._out); p.remove(); }
}

// ─── Arrows ─────────────────────────────────────────────────────────────────
function drawAllArrows(){ for(let l=0; l<LANES; l++) drawArrows(l); }

function drawArrows(l){
  const canv = document.getElementById('arrows-'+l);
  if(!canv) return;
  const ctx = canv.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const W = canv.offsetWidth;
  canv.width = W*dpr; canv.height = 52*dpr;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, 52);

  const base = l * LANE;
  // Arrow tip lands on the row immediately below: mask grid for pshufb, dst grid otherwise.
  const downGridId = CFG.control === 'mask' ? 'mask-grid-' : 'dst-grid-';
  const pairs = [];

  if(CFG.control === 'imm8' && hovImm >= 0){
    pairs.push([base + CFG.shufBase + getField(hovImm), base + CFG.shufBase + hovImm]);
  } else {
    const ref = hovLane >= 0 ? hovLane : (hovK >= 0 ? hovK : -1);
    if(ref >= 0 && laneOf(ref) === l){
      const rt = srcRouteFor(ref);
      if(rt.kind === 'val') pairs.push([rt.srcIdx, ref]);
    } else if(hovSrc >= 0 && laneOf(hovSrc) === l){
      for(let i=base; i<base+LANE; i++){
        const rt = srcRouteFor(i);
        if(rt.kind === 'val' && rt.srcIdx === hovSrc) pairs.push([hovSrc, i]);
      }
    }
  }
  if(!pairs.length) return;

  const srcG  = document.getElementById('src-grid-'+l);
  const downG = document.getElementById(downGridId+l);
  if(!srcG || !downG) return;
  const canvRect = canv.getBoundingClientRect();
  function cx(grid, globalIdx){
    const within = globalIdx - base;
    const c = grid.querySelectorAll('.cell')[within];
    if(!c) return 0;
    const r = c.getBoundingClientRect();
    return r.left + r.width/2 - canvRect.left;
  }

  for(const [si, di] of pairs){
    const x1 = cx(srcG, si), x2 = cx(downG, di);
    const y1 = 2, y2 = 48, my = (y1+y2)/2;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.bezierCurveTo(x1, my, x2, my, x2, y2);
    ctx.strokeStyle = '#EF9F27'; ctx.lineWidth = 2; ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x2, y2);
    ctx.lineTo(x2 - 5, y2 - 8);
    ctx.lineTo(x2 + 5, y2 - 8);
    ctx.closePath();
    ctx.fillStyle = '#EF9F27'; ctx.fill();
  }
}

// ─── Bootstrap ──────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => selectInstruction(t.dataset.instr));
});
window.addEventListener('hashchange', () => {
  const name = location.hash.replace(/^#/, '');
  if(CONFIGS[name] && (!CFG || CFG !== CONFIGS[name])) selectInstruction(name);
});
window.addEventListener('resize', drawAllArrows);

const initialName = (CONFIGS[location.hash.replace(/^#/, '')] ? location.hash.slice(1) : 'pshufb');
selectInstruction(initialName);
</script>
