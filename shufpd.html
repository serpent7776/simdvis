<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHUFPD — Interactive Double Shuffle Visualiser</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --bg3: #eeede8;
    --text: #1a1a18;
    --text2: #5f5e5a;
    --text3: #888780;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --font-mono: ui-monospace, 'Cascadia Code', 'Fira Mono', monospace;
    --font-sans: system-ui, -apple-system, sans-serif;
    --radius: 8px;
    --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c;
      --bg2: #272725;
      --bg3: #2e2e2c;
      --text: #e8e6df;
      --text2: #9c9a92;
      --text3: #6e6c66;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
    }
  }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .card {
    background: var(--bg);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    width: 100%;
    max-width: 500px;
  }

  .header { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: .25rem; }
  .title { font-size: 16px; font-weight: 500; }
  .subtitle { font-size: 12px; color: var(--text2); margin-bottom: 1rem; }

  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 500; font-family: var(--font-mono); }
  .bb { background: #B5D4F4; color: #042C53; }
  .bp { background: #E0D4F7; color: #3B1F8C; }
  .ba { background: #FAC775; color: #412402; }
  .bg { background: #C0DD97; color: #173404; }
  .bz { background: #D3D1C7; color: #2C2C2A; }

  @media (prefers-color-scheme: dark) {
    .bb { background: #0C447C; color: #B5D4F4; }
    .bp { background: #3B1F8C; color: #E0D4F7; }
    .ba { background: #633806; color: #FAC775; }
    .bg { background: #27500A; color: #C0DD97; }
    .bz { background: #444441; color: #D3D1C7; }
  }

  .reg-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 3px; }
  .imm-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 3px; }

  .cell {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border-radius: 6px; border: 0.5px solid; font-family: var(--font-mono);
    font-size: 11px; font-weight: 500; transition: background .15s, box-shadow .15s;
    min-width: 0; position: relative; height: 46px;
  }
  .cell-idx { font-size: 9px; font-weight: 400; opacity: .55; margin-bottom: 1px; }
  .cell-val { font-size: 11px; line-height: 1; }

  .src-cell  { background: #E6F1FB; border-color: #378ADD; color: #0C447C; cursor: pointer; }
  .src-cell:hover { background: #B5D4F4; }
  .src-cell.lit { background: #FAC775; border-color: #EF9F27; color: #412402; box-shadow: 0 0 0 2px #EF9F27; }

  .src2-cell { background: #EDE6FB; border-color: #8B5CF6; color: #3B1F8C; cursor: pointer; }
  .src2-cell:hover { background: #D8CCFA; }
  .src2-cell.lit { background: #FAC775; border-color: #EF9F27; color: #412402; box-shadow: 0 0 0 2px #EF9F27; }

  .imm-cell { background: #FAEEDA; border-color: #EF9F27; color: #633806; cursor: pointer; }
  .imm-cell:hover { background: #FAC775; }
  .imm-cell.active { box-shadow: 0 0 0 2.5px #EF9F27; transform: scale(1.08); z-index: 3; }

  .dst-val { background: #EAF3DE; border-color: #639922; color: #27500A; cursor: default; }

  @media (prefers-color-scheme: dark) {
    .src-cell  { background: #0C447C; border-color: #378ADD; color: #B5D4F4; }
    .src-cell:hover { background: #185FA5; }
    .src-cell.lit { background: #633806; border-color: #EF9F27; color: #FAC775; box-shadow: 0 0 0 2px #EF9F27; }
    .src2-cell { background: #3B1F8C; border-color: #8B5CF6; color: #EDE6FB; }
    .src2-cell:hover { background: #4E2EB5; }
    .src2-cell.lit { background: #633806; border-color: #EF9F27; color: #FAC775; box-shadow: 0 0 0 2px #EF9F27; }
    .imm-cell { background: #633806; border-color: #EF9F27; color: #FAC775; }
    .imm-cell:hover { background: #854F0B; }
    .dst-val { background: #27500A; border-color: #639922; color: #C0DD97; }
  }

  .row-lbl { font-size: 11px; color: var(--text2); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  .hint { font-size: 11px; color: var(--text3); }
  .imm-lbl { font-size: 12px; color: var(--text2); font-family: var(--font-mono); margin-top: 6px; text-align: center; }

  .info {
    font-size: 12px; color: var(--text2);
    background: var(--bg2); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 9px 13px; line-height: 1.6; min-height: 40px;
    margin-top: .75rem;
  }
  .info strong { color: var(--text); }

  select {
    font-size: 11px; padding: 2px 5px; border-radius: 5px;
    border: 0.5px solid var(--border2);
    background: var(--bg2); color: var(--text);
  }

  .popup {
    position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
    background: var(--bg); border: 0.5px solid var(--border2);
    border-radius: var(--radius); padding: 8px; z-index: 50;
    display: flex; flex-direction: column; gap: 5px; min-width: 200px;
    box-shadow: 0 4px 16px rgba(0,0,0,.12);
  }
  .popup-lbl { font-size: 10px; color: var(--text3); font-family: var(--font-mono); }
  .popup input[type=text] {
    font-family: var(--font-mono); font-size: 12px; width: 100%;
    padding: 4px 7px; border-radius: 4px; border: 0.5px solid var(--border2);
    background: var(--bg2); color: var(--text);
  }
  .popup-row { display: flex; gap: 4px; }
  .popup button {
    font-size: 11px; padding: 3px 8px; border-radius: 4px;
    border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text);
    cursor: pointer; flex: 1;
  }
  .popup button:hover { background: var(--bg3); }

  footer {
    margin-top: 1.5rem; padding-top: 1rem;
    border-top: 0.5px solid var(--border);
    font-size: 11px; color: var(--text3);
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
  }
  footer a { color: var(--text3); text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
  footer a:hover { color: var(--text2); }
  .gh-icon { width: 14px; height: 14px; fill: currentColor; }
</style>
</head>
<body>
<div class="card">

  <div class="header">
    <span class="title">SHUFPD</span>
    <span class="badge bb">SSE2</span>
    <span class="badge bz">128-bit XMM</span>
    <span style="flex:1"></span>
    <label style="font-size:11px;color:var(--text2);display:flex;align-items:center;gap:5px">
      Preset:
      <select id="preset" onchange="applyPreset(this.value)">
        <option value="identity">Identity (0b00)</option>
        <option value="swap">Swap (0b01)</option>
        <option value="bothhigh">Both high (0b11)</option>
      </select>
    </label>
  </div>
  <p class="subtitle">Shuffle packed doubles — dst[0] from src1[bit0], dst[1] from src2[bit1]</p>

  <div class="row-lbl"><span class="badge bb">src1</span><span class="hint">click to edit</span></div>
  <div class="reg-grid" id="src1-grid" style="position:relative"></div>

  <div style="height:6px"></div>

  <div class="row-lbl"><span class="badge bp">src2</span><span class="hint">click to edit</span></div>
  <div class="reg-grid" id="src2-grid" style="position:relative"></div>

  <div style="position:relative;height:60px;margin:2px 0">
    <canvas id="acanv" style="width:100%;display:block" height="60"></canvas>
  </div>

  <div class="row-lbl"><span class="badge bg">dst</span></div>
  <div class="reg-grid" id="dst-grid"></div>

  <div style="height:10px"></div>

  <div class="row-lbl">
    <span class="badge ba">imm8</span>
    <span class="hint">click to toggle 0/1</span>
  </div>
  <div class="imm-grid" id="imm-grid"></div>
  <div class="imm-lbl" id="imm-lbl"></div>

  <div class="info" id="info">Hover over any cell to inspect the shuffle.</div>

  <footer>
    <a href="index.html">&larr; All visualisers</a>
    <a href="https://github.com/serpent7776/simdvis">
      <svg class="gh-icon" viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.64 7.64 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
      simdvis
    </a>
    <a href="https://www.felixcloutier.com/x86/shufpd" target="_blank" rel="noopener">Intel ISA reference ↗</a>
  </footer>
</div>

<script>
const N=2;
/* Store 64-bit values as hex strings (no 0x prefix internally) */
let src1=['0000000000000000','1111111111111111'];
let src2=['AAAAAAAAAAAAAAAA','BBBBBBBBBBBBBBBB'];
let imm8=0;
let hovLane=-1, hovSrc1=-1, hovSrc2=-1;

const PRESETS={identity:0x0,swap:0x1,bothhigh:0x3};

function getBit(i){return (imm8>>i)&1}
function setBit(i,v){imm8=(imm8&~(1<<i))|((v&1)<<i)}
function dstVal(i){const b=getBit(i);return i===0?src1[b]:src2[b]}
function hex2(v){return v.toString(16).toUpperCase().padStart(2,'0')}

function applyPreset(k){
  if(PRESETS[k]!==undefined){imm8=PRESETS[k];closePopup();hovLane=-1;hovSrc1=-1;hovSrc2=-1;render();drawArrows()}
}

function render(){renderSrc1();renderSrc2();renderDst();renderImm();document.getElementById('imm-lbl').textContent='imm8 = 0b'+((imm8>>1)&1)+''+(imm8&1)+' (0x0'+hex2(imm8).slice(-1)+')'}

function renderSrc1(){
  const g=document.getElementById('src1-grid');
  const old=document.getElementById('active-popup');
  g.innerHTML='';
  if(old&&old._popTarget==='src1')g.appendChild(old);
  for(let i=0;i<N;i++){
    let lit=hovSrc1===i||(hovLane===0&&getBit(0)===i);
    const el=document.createElement('div');
    el.className='cell src-cell'+(lit?' lit':'');
    el.innerHTML=`<span class="cell-idx">[${i}]</span><span class="cell-val">0x${src1[i]}</span>`;
    el.title=`src1[${i}] = 0x${src1[i]} — click to edit`;
    el.onclick=()=>openSrcPopup(src1,'src1',i,el,document.getElementById('src1-grid'));
    el.addEventListener('mouseenter',()=>{hovSrc1=i;hovSrc2=-1;hovLane=-1;render();drawArrows();updateInfo()});
    el.addEventListener('mouseleave',()=>{hovSrc1=-1;render();drawArrows();resetInfo()});
    g.appendChild(el);
  }
}

function renderSrc2(){
  const g=document.getElementById('src2-grid');
  const old=document.getElementById('active-popup');
  g.innerHTML='';
  if(old&&old._popTarget==='src2')g.appendChild(old);
  for(let i=0;i<N;i++){
    let lit=hovSrc2===i||(hovLane===1&&getBit(1)===i);
    const el=document.createElement('div');
    el.className='cell src2-cell'+(lit?' lit':'');
    el.innerHTML=`<span class="cell-idx">[${i}]</span><span class="cell-val">0x${src2[i]}</span>`;
    el.title=`src2[${i}] = 0x${src2[i]} — click to edit`;
    el.onclick=()=>openSrcPopup(src2,'src2',i,el,document.getElementById('src2-grid'));
    el.addEventListener('mouseenter',()=>{hovSrc2=i;hovSrc1=-1;hovLane=-1;render();drawArrows();updateInfo()});
    el.addEventListener('mouseleave',()=>{hovSrc2=-1;render();drawArrows();resetInfo()});
    g.appendChild(el);
  }
}

function renderDst(){
  const g=document.getElementById('dst-grid');g.innerHTML='';
  for(let i=0;i<N;i++){
    const v=dstVal(i);
    const el=document.createElement('div');
    el.className='cell dst-val';
    let hl=hovLane===i;
    if(hovSrc1>=0&&i===0&&getBit(0)===hovSrc1)hl=true;
    if(hovSrc2>=0&&i===1&&getBit(1)===hovSrc2)hl=true;
    if(hl)el.style.boxShadow='0 0 0 2.5px #639922';
    el.innerHTML=`<span class="cell-idx">[${i}]</span><span class="cell-val">0x${v}</span>`;
    el.addEventListener('mouseenter',()=>{hovLane=i;hovSrc1=-1;hovSrc2=-1;render();drawArrows();updateInfo()});
    el.addEventListener('mouseleave',()=>{hovLane=-1;render();drawArrows();resetInfo()});
    g.appendChild(el);
  }
}

function renderImm(){
  const g=document.getElementById('imm-grid');g.innerHTML='';
  for(let i=0;i<N;i++){
    const b=getBit(i);
    const fromSrc=i===0?'src1':'src2';
    const act=hovLane===i||(hovSrc1>=0&&i===0&&getBit(0)===hovSrc1)||(hovSrc2>=0&&i===1&&getBit(1)===hovSrc2);
    const el=document.createElement('div');
    el.className='cell imm-cell'+(act?' active':'');
    el.innerHTML=`<span class="cell-idx">${fromSrc} bit ${i}</span><span class="cell-val">${b}</span>`;
    el.title=`imm8 bit ${i} = ${b} → ${fromSrc}[${b}]`;
    el.onclick=()=>{setBit(i,getBit(i)^1);document.getElementById('preset').value='';hovLane=i;hovSrc1=-1;hovSrc2=-1;render();drawArrows();updateInfo()};
    el.addEventListener('mouseenter',()=>{hovLane=i;hovSrc1=-1;hovSrc2=-1;render();drawArrows();updateInfo()});
    el.addEventListener('mouseleave',()=>{hovLane=-1;render();drawArrows();resetInfo()});
    g.appendChild(el);
  }
}

function updateInfo(){
  const box=document.getElementById('info');
  if(hovSrc1>=0){
    if(getBit(0)===hovSrc1) box.innerHTML=`<strong>src1[${hovSrc1}] = 0x${src1[hovSrc1]}</strong> → copied to <strong>dst[0]</strong>`;
    else box.innerHTML=`<strong>src1[${hovSrc1}] = 0x${src1[hovSrc1]}</strong> — not currently selected (bit 0 = ${getBit(0)})`;
    return;
  }
  if(hovSrc2>=0){
    if(getBit(1)===hovSrc2) box.innerHTML=`<strong>src2[${hovSrc2}] = 0x${src2[hovSrc2]}</strong> → copied to <strong>dst[1]</strong>`;
    else box.innerHTML=`<strong>src2[${hovSrc2}] = 0x${src2[hovSrc2]}</strong> — not currently selected (bit 1 = ${getBit(1)})`;
    return;
  }
  if(hovLane<0){resetInfo();return}
  const b=getBit(hovLane);
  if(hovLane===0) box.innerHTML=`<strong>imm8 bit 0 = ${b}</strong> → reads <strong>src1[${b}] = 0x${src1[b]}</strong> → <strong>dst[0]</strong>`;
  else box.innerHTML=`<strong>imm8 bit 1 = ${b}</strong> → reads <strong>src2[${b}] = 0x${src2[b]}</strong> → <strong>dst[1]</strong>`;
}
function resetInfo(){document.getElementById('info').textContent='Hover over any cell to inspect the shuffle.'}

function openSrcPopup(arr,name,i,el,grid){
  closePopup();
  const gRect=grid.getBoundingClientRect();
  const eRect=el.getBoundingClientRect();
  const leftPx=eRect.left+eRect.width/2-gRect.left;

  const pop=document.createElement('div');
  pop.className='popup';pop.id='active-popup';pop._popTarget=name;
  pop.style.left=leftPx+'px';

  const lbl=document.createElement('div');lbl.className='popup-lbl';lbl.textContent=`${name}[${i}]`;
  const inp=document.createElement('input');inp.type='text';inp.value='0x'+arr[i];inp.placeholder='0x0000000000000000';
  inp.onkeydown=e=>{if(e.key==='Enter'){commitSrc(arr,i,inp.value);closePopup()}if(e.key==='Escape')closePopup()};

  const row=document.createElement('div');row.className='popup-row';
  const btnOk=document.createElement('button');btnOk.textContent='Set';btnOk.onclick=()=>{commitSrc(arr,i,inp.value);closePopup()};
  const btnX=document.createElement('button');btnX.textContent='Cancel';btnX.style.color='var(--text3)';btnX.onclick=closePopup;
  row.appendChild(btnOk);row.appendChild(btnX);

  pop.appendChild(lbl);pop.appendChild(inp);pop.appendChild(row);
  grid.appendChild(pop);setTimeout(()=>inp.select(),0);
  function outside(e){if(!pop.contains(e.target)&&e.target!==el)closePopup()}
  pop._out=outside;document.addEventListener('mousedown',outside);
}

function commitSrc(arr,i,raw){
  let s=raw.trim().replace(/^0x/i,'').toUpperCase();
  if(/^[0-9A-F]{1,16}$/.test(s)){arr[i]=s.padStart(16,'0');render();drawArrows()}
}
function closePopup(){
  const p=document.getElementById('active-popup');
  if(p){document.removeEventListener('mousedown',p._out);p.remove()}
}

function drawArrows(){
  const canv=document.getElementById('acanv');
  const ctx=canv.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const W=canv.offsetWidth;
  const H=60;
  canv.width=W*dpr;canv.height=H*dpr;
  ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);

  const arrows=[];
  if(hovLane>=0){
    const b=getBit(hovLane);
    if(hovLane===0) arrows.push(['src1-grid',b,0,'#378ADD']);
    else arrows.push(['src2-grid',b,1,'#8B5CF6']);
  } else if(hovSrc1>=0){
    if(getBit(0)===hovSrc1) arrows.push(['src1-grid',hovSrc1,0,'#378ADD']);
  } else if(hovSrc2>=0){
    if(getBit(1)===hovSrc2) arrows.push(['src2-grid',hovSrc2,1,'#8B5CF6']);
  }
  if(!arrows.length)return;

  const dstG=document.getElementById('dst-grid');
  const canvRect=canv.getBoundingClientRect();
  function cx(grid,idx){const c=grid.querySelectorAll('.cell')[idx];if(!c)return 0;const r=c.getBoundingClientRect();return r.left+r.width/2-canvRect.left}

  for(const [gid,si,di,color] of arrows){
    const srcG=document.getElementById(gid);
    const x1=cx(srcG,si),x2=cx(dstG,di);
    const y1=2,y2=H-4,my=(y1+y2)/2;
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.bezierCurveTo(x1,my,x2,my,x2,y2);
    ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke();
    ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-5,y2-8);ctx.lineTo(x2+5,y2-8);ctx.closePath();ctx.fillStyle=color;ctx.fill();
  }
}

const _ip=document.getElementById('preset').value;
if(PRESETS[_ip]!==undefined)imm8=PRESETS[_ip];
render();
window.addEventListener('resize',drawArrows);
</script>
</body>
</html>
